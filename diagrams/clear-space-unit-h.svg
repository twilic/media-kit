<svg xmlns="http://www.w3.org/2000/svg" viewBox="-580 -70 3160 2140" role="img" aria-labelledby="title-h desc-h">
  <title id="title-h">Clear space unit H around the Twilic wordmark</title>
  <desc id="desc-h">Exclusion zone equal to one times the wordmark ink height H on every side of the letterforms.</desc>
