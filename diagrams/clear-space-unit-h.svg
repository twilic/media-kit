  <polygon points="1814,722 1826,722 1820,710" fill="#E85D04"/>
  <polygon points="1814,1278 1826,1278 1820,1290" fill="#E85D04"/>
  <text x="1840" y="1006" text-anchor="start" font-family="system-ui,sans-serif" font-size="42" fill="#E85D04" font-weight="600">H</text>

