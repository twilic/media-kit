  <polygon points="1812,1674 1812,1686 1800,1680" fill="#E85D04"/>
  <polygon points="2368,1674 2368,1686 2380,1680" fill="#E85D04"/>
  <text x="2090" y="1652" text-anchor="middle" font-family="system-ui,sans-serif" font-size="42" fill="#E85D04" font-weight="600">1×H</text>

  <!-- legend (centered below diagram) -->
  <g font-family="system-ui,sans-serif" font-size="30" fill="#666">
    <rect x="800" y="1906" width="16" height="16" fill="none" stroke="#36A9F8" stroke-width="3" stroke-dasharray="5 4"/>
    <text x="824" y="1920">Ink bounds</text>
