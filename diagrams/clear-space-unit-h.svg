    </pattern>
  </defs>

  <rect x="-580" y="-70" width="3160" height="2140" fill="#FAFAFA"/>

  <!-- title -->
  <text x="1000" y="75" text-anchor="middle" font-family="system-ui,sans-serif" font-size="40" fill="#E85D04" font-weight="600">Exclusion zone (1×H each side)</text>

