    <text x="1064" y="1920">Exclusion zone</text>
  </g>

  <text x="1000" y="1995" text-anchor="middle" font-family="system-ui,sans-serif" font-size="34" fill="#666">H = wordmark ink height (580 px at 2000×2000 master)</text>
