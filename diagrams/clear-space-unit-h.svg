  <polygon points="-368,124 -368,136 -380,130" fill="#E85D04"/>
  <polygon points="188,124 188,136 200,130" fill="#E85D04"/>
  <text x="-90" y="106" text-anchor="middle" font-family="system-ui,sans-serif" font-size="42" fill="#E85D04" font-weight="600">1×H</text>

  <!-- dimensions: left (upper) -->
